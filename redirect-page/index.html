<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --background: oklch(0.1288 0.0406 264.6952);
            --foreground: oklch(0.9842 0.0034 247.8575);
            --card: oklch(0.2077 0.0398 265.7549);
            --card-foreground: oklch(0.9842 0.0034 247.8575);
            --primary: oklch(0.8871 0.2122 128.5041);
            --primary-foreground: oklch(0 0 0);
            --muted: oklch(0.2795 0.0368 260.0310);
            --muted-foreground: oklch(0.7107 0.0351 256.7878);
            --border: oklch(0.2795 0.0368 260.0310);
            --ring: oklch(0.8871 0.2122 128.5041);
            --radius: 1rem;
        }

        @theme inline {
            --color-background: var(--background);
            --color-foreground: var(--foreground);
            --color-card: var(--card);
            --color-card-foreground: var(--card-foreground);
            --color-primary: var(--primary);
            --color-primary-foreground: var(--primary-foreground);
            --color-muted: var(--muted);
            --color-muted-foreground: var(--muted-foreground);
            --color-border: var(--border);
            --color-ring: var(--ring);
            --radius-lg: var(--radius);
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: Inter, system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .loader {
            border: 3px solid var(--muted);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-background text-foreground antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-card text-card-foreground border border-border shadow-2xl rounded-lg p-8 max-w-md w-full text-center flex flex-col items-center gap-6">
        <img src="logo.png" alt="Logo" class="w-32 h-auto max-h-32 object-contain rounded-xl" />
        
        <div class="space-y-2">
            <h1 class="text-2xl font-semibold tracking-tight">Redirecting</h1>
            <p class="text-muted-foreground text-sm">You are being redirected to our new website.</p>
        </div>

        <div class="flex items-center gap-2 text-muted-foreground">
            <div class="loader"></div>
            <span class="text-sm font-medium">Redirecting in <span id="countdown" class="text-foreground font-semibold">4</span> seconds...</span>
        </div>

        <a href="https://widgetai.youssef.tn/" class="inline-flex items-center justify-center rounded-lg bg-[var(--primary)] text-[var(--primary-foreground)] hover:opacity-90 transition-colors h-10 px-4 py-2 text-sm font-medium w-full mt-4 ring-offset-[var(--background)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--ring)] focus-visible:ring-offset-2 cursor-pointer shadow-md">
            Click here if not redirected
        </a>
    </div>

    <script>
        const targetUrl = 'https://widgetai.youssef.tn/';
        const countdownElement = document.getElementById('countdown');
        let timeLeft = 4;

        const interval = setInterval(() => {
            timeLeft -= 1;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(interval);
                window.location.href = targetUrl;
            }
        }, 1000);

        // Fallback for safety
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 4500);
    </script>
</body>
</html>
